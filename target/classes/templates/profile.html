<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - BusGo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-brand"><a href="/search">🚌 BusGo</a></div>
    <div class="nav-links">
        <a href="/search" class="nav-link">Search</a>
        <a href="/history" class="nav-link">My Bookings</a>
        <a href="/profile" class="nav-link active">Profile</a>
    </div>
    <div class="nav-auth">
        <a href="/logout" class="btn btn-outline">Logout</a>
    </div>
</nav>

<div class="profile-page">
    <div class="profile-card">
        <div class="profile-avatar">
            <div class="avatar-circle" id="avatarCircle">?</div>
            <h2 id="profileName">Loading...</h2>
            <p id="profileEmail" class="profile-email"></p>
            <span class="badge badge-primary" id="profileRole"></span>
        </div>
        <div class="profile-stats" id="profileStats">
            <div class="ps-item"><div class="ps-value" id="totalBookings">-</div><div class="ps-label">Total Bookings</div></div>
            <div class="ps-item"><div class="ps-value" id="confirmedBookings">-</div><div class="ps-label">Confirmed</div></div>
            <div class="ps-item"><div class="ps-value" id="cancelledBookings">-</div><div class="ps-label">Cancelled</div></div>
            <div class="ps-item"><div class="ps-value" id="totalSpent">-</div><div class="ps-label">Total Spent</div></div>
        </div>
        <div class="profile-actions">
            <a href="/history" class="btn btn-primary">📋 View My Bookings</a>
            <a href="/search" class="btn btn-secondary">🔍 Search Buses</a>
            <a href="/logout" class="btn btn-outline">🚪 Logout</a>
        </div>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
<script>
async function loadProfile() {
    const meRes = await fetch('/api/me');
    if (meRes.status === 401) { window.location.href = '/login'; return; }
    const me = await meRes.json();
    document.getElementById('profileName').textContent = me.name;
    document.getElementById('profileEmail').textContent = me.email;
    document.getElementById('profileRole').textContent = me.role;
    document.getElementById('avatarCircle').textContent = me.name.charAt(0).toUpperCase();

    const bookRes = await fetch('/api/my-bookings');
    const bookings = await bookRes.json();
    const confirmed = bookings.filter(b => b.status === 'CONFIRMED');
    const cancelled = bookings.filter(b => b.status === 'CANCELLED');
    const spent = confirmed.reduce((sum, b) => sum + b.totalFare, 0);

    document.getElementById('totalBookings').textContent = bookings.length;
    document.getElementById('confirmedBookings').textContent = confirmed.length;
    document.getElementById('cancelledBookings').textContent = cancelled.length;
    document.getElementById('totalSpent').textContent = `₹${spent.toFixed(0)}`;
}
loadProfile();
</script>
</body>
</html>
