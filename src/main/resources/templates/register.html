<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BusGo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <span class="logo-icon">🚌</span>
            <h1>BusGo</h1>
            <p>Create Your Account</p>
        </div>

        <div id="alertBox" class="alert" style="display:none;"></div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Create a password (min 6 chars)" required>
                <span class="toggle-password" onclick="togglePassword()">👁</span>
            </div>
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
        </div>

        <button onclick="registerUser()" class="btn btn-primary btn-full">Create Account</button>

        <div class="auth-footer">
            <p>Already have an account? <a href="/login">Sign in here</a></p>
        </div>
    </div>
    <div class="auth-illustration">
        <div class="illustration-content">
            <div class="big-bus">🎫</div>
            <h2>Join BusGo</h2>
            <p>Register now to access exclusive deals and manage your bookings effortlessly.</p>
            <div class="features">
                <div class="feature-item">🎯 Personalized experience</div>
                <div class="feature-item">📱 Booking history</div>
                <div class="feature-item">🔔 Travel reminders</div>
                <div class="feature-item">⭐ Rate your journey</div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
<script>
function togglePassword() {
    const p = document.getElementById('password');
    p.type = p.type === 'password' ? 'text' : 'password';
}

async function registerUser() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;

    if (!name || !email || !password) {
        showAlert('alertBox', 'All fields are required', 'error');
        return;
    }
    if (password.length < 6) {
        showAlert('alertBox', 'Password must be at least 6 characters', 'error');
        return;
    }
    if (password !== confirm) {
        showAlert('alertBox', 'Passwords do not match', 'error');
        return;
    }

    const btn = document.querySelector('.btn-primary');
    btn.textContent = 'Creating account...';
    btn.disabled = true;

    try {
        const res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (res.ok) {
            showAlert('alertBox', 'Account created! Redirecting to login...', 'success');
            setTimeout(() => window.location.href = '/login', 1500);
        } else {
            showAlert('alertBox', data.error || 'Registration failed', 'error');
            btn.textContent = 'Create Account';
            btn.disabled = false;
        }
    } catch {
        showAlert('alertBox', 'Network error. Please try again.', 'error');
        btn.textContent = 'Create Account';
        btn.disabled = false;
    }
}
</script>
</body>
</html>
